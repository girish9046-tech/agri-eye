<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heatmaps | AGRI-EYE Smart Farm Monitoring</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <script>
      // Legacy heatmaps.html — redirect to the SPA dashboard with heatmaps mode
      try {
        if (window.localStorage.getItem('agri-eye-auth') === 'true') {
          // Set heatmaps mode flag so the dashboard shows enlarged heatmap view
          window.sessionStorage.setItem('agri-eye-heatmaps-mode', 'true');
          window.location.replace('./#/dashboard');
        } else {
          window.location.replace('./#/auth');
        }
      } catch (e) {
        window.location.replace('./');
      }
    </script>
  </head>
  <body>
    <p>Redirecting to heatmaps...</p>
  </body>
</html>
